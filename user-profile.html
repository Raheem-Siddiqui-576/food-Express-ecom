<!-- Header -->

<div class="profile-header text-center">

<h2>My Profile</h2>
<p>Manage your personal information</p>

</div>


<!-- Profile Section -->

<div class="container">

<div class="profile-card mb-5" id="main">

<div class="row align-items-center">
<div class="col-md-4 text-center mb-4">

<img  class="profile-img" id="pro-img">

<h5 class="mt-3" id="userName"></h5>
<p class="text-muted">FoodExpress User</p>

</div>


<!-- Right Form -->

<div class="col-md-8">

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label>First Name</label>
<input type="text" class="form-control" placeholder="First Name" id="first-name" readonly>
</div>

<div class="col-md-6 mb-3">
<label>Last Name</label>
<input type="text" class="form-control" placeholder="Last Name" id="last-name" readonly>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Email Address" id="email" readonly>
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" placeholder="Phone Number" id="cell-no" readonly>
</div>

<div class="col-12 mb-3">
<label>Address</label>
<input type="text" class="form-control" placeholder="Street Address" id="address" readonly>
</div>

<div class="col-md-6 mb-3">
<label>City</label>
<input type="text" class="form-control" placeholder="City" id="city" readonly>
</div>

<div class="col-md-6 mb-3">
<label>State</label>
<input type="text" class="form-control" placeholder="State" id="state" readonly>
</div>
</div>

</form>

</div>

</div>

</div>

<!-- signin google -->
<div class="profile-card mb-5" id="sigin-google">

<div class="row align-items-center">

<div class="col-md-4 text-center mb-4">

<img  class="profile-img" id="pro-img-2">

<h5 class="mt-3" id="userName"></h5>
<p class="text-muted">FoodExpress User</p>

</div>


<!-- Right Form -->

<div class="col-md-8">

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" class="form-control" placeholder="First Name" id="fullName" readonly>
</div>
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Email Address" id="email2" readonly>
</div>
<div class="col-md-6 mb-3">
<label>user Id</label>
<input type="text" class="form-control" placeholder="State" id="uid" readonly>
</div>
</div>

</form>

</div>

</div>
